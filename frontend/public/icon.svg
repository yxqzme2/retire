<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#0f172a"/>

  <!-- Horizon line -->
  <line x1="14" y1="88" x2="114" y2="88" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Sun (partial, rising above horizon) -->
  <clipPath id="above-horizon">
    <rect x="0" y="0" width="128" height="88"/>
  </clipPath>
  <circle cx="64" cy="88" r="20" fill="#f59e0b" opacity="0.9" clip-path="url(#above-horizon)"/>
  <!-- Sun rays -->
  <g stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.6" clip-path="url(#above-horizon)">
    <line x1="64" y1="62" x2="64" y2="55"/>
    <line x1="78" y1="66" x2="83" y2="61"/>
    <line x1="50" y1="66" x2="45" y2="61"/>
    <line x1="83" y1="76" x2="90" y2="74"/>
    <line x1="45" y1="76" x2="38" y2="74"/>
  </g>

  <!-- Chart grid lines (subtle) -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.8">
    <line x1="16" y1="80" x2="112" y2="80"/>
    <line x1="16" y1="65" x2="112" y2="65"/>
    <line x1="16" y1="50" x2="112" y2="50"/>
    <line x1="16" y1="35" x2="112" y2="35"/>
  </g>

  <!-- Area fill under chart line -->
  <path d="M16,80 L30,72 L45,68 L58,58 L72,48 L85,38 L100,28 L112,22 L112,88 L16,88 Z"
        fill="#10b981" opacity="0.12"/>

  <!-- Chart growth line -->
  <polyline
    points="16,80 30,72 45,68 58,58 72,48 85,38 100,28 112,22"
    fill="none"
    stroke="#10b981"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Data point dots -->
  <circle cx="16"  cy="80" r="3" fill="#10b981"/>
  <circle cx="45"  cy="68" r="3" fill="#10b981"/>
  <circle cx="72"  cy="48" r="3" fill="#10b981"/>
  <circle cx="100" cy="28" r="3" fill="#10b981"/>
  <circle cx="112" cy="22" r="3.5" fill="#10b981"/>
  <!-- Highlight ring on final point -->
  <circle cx="112" cy="22" r="6" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>

  <!-- Dollar coin stack (bottom right) -->
  <ellipse cx="96" cy="110" rx="12" ry="5" fill="#f59e0b" opacity="0.9"/>
  <rect x="84" y="104" width="24" height="6" rx="1" fill="#d97706"/>
  <ellipse cx="96" cy="104" rx="12" ry="5" fill="#f59e0b" opacity="0.9"/>
  <rect x="84" y="98" width="24" height="6" rx="1" fill="#d97706"/>
  <ellipse cx="96" cy="98" rx="12" ry="5" fill="#fbbf24"/>
  <text x="96" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#92400e">$</text>

  <!-- "RV" label bottom-left -->
  <text x="14" y="122" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981" opacity="0.85">RV</text>
</svg>
